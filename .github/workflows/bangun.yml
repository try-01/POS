name: Android Release Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    
    # Izin agar GitHub Action bot bisa melakukan commit & push
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # --- STEP BARU: Mengecek, Mengunduh, dan Menjalankan Ktlint ---
      - name: Check, Download and Run Ktlint (Optimize Imports)
        run: |
          # Mengecek apakah file 'ktlint' TIDAK ADA di root repo
          if [ ! -f "./ktlint" ]; then
            echo "File ktlint tidak ditemukan. Memulai proses unduh..."
            curl -sSLO https://github.com/pinterest/ktlint/releases/latest/download/ktlint
          else
            echo "File ktlint sudah ada di root repo. Melewati proses unduh..."
          fi
          
          # Memastikan file ktlint memiliki izin execute
          chmod a+x ktlint
          
          # Menjalankan format (termasuk hapus unused imports) untuk semua file Kotlin
          ./ktlint --format "app/src/**/*.kt" || true

      # --- STEP BARU: Commit file jika ada import yang dihapus/dirapikan ---
      - name: Auto-Commit Optimized Code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: optimize imports and format code"
      # -----------------------------------------------------------

      # Menggunakan action resmi Gradle untuk caching otomatis
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant Execute Permission for Gradlew
        run: chmod +x ./gradlew

      # Build produksi
      - name: Build APK (Parallel & Cached)
        run: ./gradlew assembleRelease --parallel --build-cache --configuration-cache --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # Menandatangani Release APK
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # Mengunggah Release APK yang sudah ditandatangani
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pos-offline-release-signed-apk
          path: |
            ${{steps.sign_app.outputs.signedReleaseFile}}
            app/**/*.json
          retention-days: 7