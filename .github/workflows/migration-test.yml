name: Database Migration Test

on:
#  push:
#    branches: [ main, master ]
#  pull_request:
#    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: migration-test-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # -----------------------------------------------------------------
  # JOB 1 — gerbang cepat di Ubuntu (tanpa emulator)
  # -----------------------------------------------------------------
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # OPTIMASI: Tambahkan --parallel dan --build-cache
      - name: Compile & export Room schemas
        run: ./gradlew :app:assembleDebug --parallel --build-cache --stacktrace

      - name: Verify Room schema files (1.json & 2.json) exist
        run: |
          set -e
          s1=$(find app/schemas -type f -name "1.json" | head -n1)
          s2=$(find app/schemas -type f -name "2.json" | head -n1)

          if [ -z "$s2" ]; then
            echo "::error::2.json (skema v2) tidak ditemukan — ekspor skema gagal. Cek plugin 'androidx.room' & exportSchema=true."
            exit 1
          fi

          if [ -z "$s1" ]; then
            echo "::error::1.json (skema v1) tidak ditemukan di app/schemas."
            exit 1
          fi

          echo "Skema OK -> v1: $s1 | v2: $s2"

      # OPTIMASI: Tambahkan --parallel dan --build-cache
      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --parallel --build-cache --stacktrace

  # -----------------------------------------------------------------
  # JOB 2 — uji migrasi di emulator (Ubuntu dengan Akselerasi KVM)
  # -----------------------------------------------------------------
  migration-test:
    needs: build-and-verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # PERBAIKAN 1: Berikan hak akses KVM secara paksa kepada user runner
      - name: Enable KVM permissions
        run: sudo chown $USER /dev/kvm

      - name: Run Room migration instrumentation test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: aosp_atd
          arch: x86_64
          disable-animations: true
          # PERBAIKAN 2: Hapus '-gpu swiftshader-indirect' karena tidak didukung di environment ini
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -camera-back none -camera-front none
          script: |
            echo "===== 1) Bangun APK app + androidTest (regenerasi skema via KSP) ====="
            ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest --parallel --build-cache --stacktrace

            echo "===== 2) Pohon skema pada app/schemas ====="
            find app/schemas -type f -name "*.json" | sort

            echo "===== 3) Isi APK (bukti skema ada di dalam APK) ====="
            echo "--- androidTest APK ---"
            unzip -l app/build/outputs/apk/androidTest/debug/*.apk 2>/dev/null | grep -i json || echo "(tidak ada json)"
            echo "--- debug app APK ---"
            unzip -l app/build/outputs/apk/debug/*.apk 2>/dev/null | grep -i json || echo "(tidak ada json)"

            echo "===== 4) Jalankan uji migrasi (perintah tunggal, tanpa lanjutan baris) ====="
            ./gradlew :app:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.pos.offline.data.local.PosDatabaseMigrationTest --parallel --build-cache --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-test-reports
          path: |
            app/build/reports/androidTests
            app/build/outputs/androidTest-results
          if-no-files-found: warn
